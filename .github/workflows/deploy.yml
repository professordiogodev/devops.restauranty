name: CI/CD Pipeline

on:
  push:
    branches:
      - my-version

env:
  REGISTRY: restaurantyacrshishir.azurecr.io

jobs:

# -------------------------
# 1️⃣ TEST STAGE
# -------------------------
  test:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        service: [auth, items, discounts]

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: |
          cd backend/${{ matrix.service }}
          npm install

      - name: Run tests
        run: |
          echo "Running tests for ${{ matrix.service }}"


# -------------------------
# 2️⃣ BUILD + PUSH STAGE
# -------------------------
  build:
    needs: test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Login to ACR
        run: |
          echo "${{ secrets.ACR_PASSWORD }}" | docker login ${{ env.REGISTRY }} -u ${{ secrets.ACR_USERNAME }} --password-stdin

      - name: Build images
        run: |
          docker build -t ${{ env.REGISTRY }}/auth:latest ./backend/auth
          docker build -t ${{ env.REGISTRY }}/items:latest ./backend/items
          docker build -t ${{ env.REGISTRY }}/discounts:latest ./backend/discounts
          docker build -t ${{ env.REGISTRY }}/client:latest ./client

      - name: Push images
        run: |
          docker push ${{ env.REGISTRY }}/auth:latest
          docker push ${{ env.REGISTRY }}/items:latest
          docker push ${{ env.REGISTRY }}/discounts:latest
          docker push ${{ env.REGISTRY }}/client:latest


# -------------------------
# 3️⃣ DEPLOY STAGE
# -------------------------
  # -------------------------
# 3️⃣ DEPLOY STAGE
# -------------------------
  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Setup kubectl
        uses: azure/setup-kubectl@v3

      - name: Configure kubeconfig
        run: |
          mkdir -p $HOME/.kube
          echo "${{ secrets.KUBE_CONFIG }}" > $HOME/.kube/config

      - name: Deploy to AKS
        run: |
          kubectl apply -f k8s/
  