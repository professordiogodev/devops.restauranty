name: CI

on:
  push:
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - backend/auth
          - backend/discounts
          - backend/items
          - client

    defaults:
      run:
        working-directory: ${{ matrix.service }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Detect lockfile
        id: lock
        run: |
          if [ -f package-lock.json ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
            echo "file=package-lock.json" >> "$GITHUB_OUTPUT"
          elif [ -f npm-shrinkwrap.json ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
            echo "file=npm-shrinkwrap.json" >> "$GITHUB_OUTPUT"
          elif [ -f yarn.lock ]; then
            echo "has=true" >> "$GITHUB_OUTPUT"
            echo "yarn=true" >> "$GITHUB_OUTPUT"
            echo "file=yarn.lock" >> "$GITHUB_OUTPUT"
          else
            echo "has=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node (npm cache)
        if: steps.lock.outputs.has == 'true' && steps.lock.outputs.yarn != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: ${{ matrix.service }}/${{ steps.lock.outputs.file }}

      - name: Setup Node (yarn cache)
        if: steps.lock.outputs.yarn == 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: yarn
          cache-dependency-path: ${{ matrix.service }}/yarn.lock

      - name: Setup Node (no cache)
        if: steps.lock.outputs.has != 'true'
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install deps
        run: |
          if [ -f yarn.lock ]; then
            corepack enable
            yarn install --frozen-lockfile || yarn install
          else
            npm ci --no-audit --no-fund || npm install
          fi

      # Build non-client services normally
      - name: Build (node service)
        if: matrix.service != 'client'
        run: npm run build --if-present

      # Build client but DO NOT fail on warnings (CRA treats warnings as errors when CI=true)
      - name: Build (client - allow warnings)
        if: matrix.service == 'client'
        env:
          CI: ""          # <- critical line
        run: npm run build
