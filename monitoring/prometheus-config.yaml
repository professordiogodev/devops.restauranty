global:
scrape_interval: 15s

scrape_configs:

* job_name: "auth-service"
  metrics_path: /metrics
  static_configs:

  * targets:

    * auth:3001

* job_name: "items-service"
  metrics_path: /metrics
  static_configs:

  * targets:

    * items:3003

* job_name: "discounts-service"
  metrics_path: /metrics
  static_configs:

  * targets:

    * discounts:3002
