services:

  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"

  auth:
   build: ./backend/auth
   ports:
    - "3001:3001"
   depends_on:
    - mongo
   environment:
    - MONGODB_URI=mongodb://mongo:27017/restauranty

  discounts:
    build: ./backend/discounts
    ports:
      - "3002:3002"
    depends_on:
      - mongo

  items:
    build: ./backend/items
    ports:
      - "3003:3003"
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "3000:80"

  haproxy:
    image: haproxy:latest
    ports:
      - "80:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - auth
      - items
      - discounts
      - client