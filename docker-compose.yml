services:
  mongo:
    image: mongo:latest
    ports:
      - "27017:27017"
    volumes:
      - mongo-data:/data/db

  auth:
    build: ./backend/auth
    ports:
      - "3001:3001"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/restauranty
    depends_on:
      - mongo

  discounts:
    build: ./backend/discounts
    ports:
      - "3002:3002"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/restauranty
    depends_on:
      - mongo

  items:
    build: ./backend/items
    ports:
      - "3003:3003"
    environment:
      - MONGODB_URI=mongodb://mongo:27017/restauranty
    depends_on:
      - mongo

  client:
    build: ./client
    ports:
      - "3000:80"

  haproxy:   # ✅ NOW INSIDE services
    image: haproxy:latest
    ports:
      - "80:80"
    volumes:
      - ./haproxy.cfg:/usr/local/etc/haproxy/haproxy.cfg
    depends_on:
      - auth
      - discounts
      - items
      - client

volumes:
  mongo-data: