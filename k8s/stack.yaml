# --- Storage (Mongo PVC) ---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: mongo-pvc
spec:
  accessModes: ["ReadWriteOnce"]
  resources:
    requests:
      storage: 2Gi
---
# --- Mongo ---
apiVersion: v1
kind: Service
metadata:
  name: mongo
  labels: { app: mongo }
spec:
  selector: { app: mongo }
  ports:
    - port: 27017
      targetPort: 27017
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: mongo
spec:
  replicas: 1
  selector: { matchLabels: { app: mongo } }
  template:
    metadata: { labels: { app: mongo } }
    spec:
      volumes:
        - name: mongo-data
          persistentVolumeClaim: { claimName: mongo-pvc }
      containers:
        - name: mongo
          image: mongo:7.0-jammy
          args: ["--dbpath", "/data/db"]
          ports: [{ containerPort: 27017 }]
          volumeMounts:
            - { name: mongo-data, mountPath: /data/db }

# --- Auth ---
---
apiVersion: v1
kind: Service
metadata:
  name: auth
  labels: { app: auth }
spec:
  selector: { app: auth }
  ports:
    - port: 3001
      targetPort: 3001
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: auth
spec:
  replicas: 1
  selector: { matchLabels: { app: auth } }
  template:
    metadata: { labels: { app: auth } }
    spec:
      containers:
        - name: auth
          image: fmtorres/restauranty-auth:0.1.0
          imagePullPolicy: IfNotPresent
          env:
            - { name: HOST, value: "0.0.0.0" }
            - { name: PORT, value: "3001" }
            - { name: MONGODB_URI, value: "mongodb://mongo:27017/flor" }
          ports: [{ containerPort: 3001 }]
          command: ["node","server.js"]

