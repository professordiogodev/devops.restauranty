# --- Client (your fixed image already built inside Minikube) ---
---
apiVersion: v1
kind: Service
metadata:
  name: client
  labels: { app: client }
spec:
  selector: { app: client }
  ports:
    - port: 80
      targetPort: 80
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: client
spec:
  replicas: 1
  selector: { matchLabels: { app: client } }
  template:
    metadata: { labels: { app: client } }
    spec:
      containers:
        - name: client
          image: restauranty/client:fix-signup-2
          imagePullPolicy: IfNotPresent
          ports: [{ containerPort: 80 }]

# --- Ingress (with TLS secret you already created) ---
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: restauranty
spec:
  ingressClassName: nginx
  tls:
    - hosts: ["restauranty.local"]
      secretName: restauranty-tls
  rules:
    - host: restauranty.local
      http:
        paths:
          - path: /api/auth
            pathType: Prefix
            backend: { service: { name: auth, port: { number: 3001 } } }
          - path: /api/discounts
            pathType: Prefix
            backend: { service: { name: discounts, port: { number: 3002 } } }
          - path: /api/items
            pathType: Prefix
            backend: { service: { name: items, port: { number: 3003 } } }
          - path: /
            pathType: Prefix
            backend: { service: { name: client, port: { number: 80 } } }
